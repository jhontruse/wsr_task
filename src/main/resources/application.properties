# =============================================================
# Configuración de aplicación — wsrFastFood
# =============================================================
spring.application.name=wsr_task
server.servlet.context-path=/task/service/api
server.servlet.context-path.task=/task
server.servlet.context-path.task.fin.all=/find/all
server.port=8080
# =============================================================
# Jackson — Zona horaria y formato de fechas
# =============================================================
spring.jackson.time-zone=America/Lima
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.deserialization.fail-on-null-for-primitives=false
# =============================================================
# SQL Init
# =============================================================
spring.sql.init.mode=never
# =============================================================
# DATASOURCE — Oracle DEV
# TODO: Mover credenciales a variables de entorno o Vault para PROD.
# =============================================================
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/FREE
spring.datasource.username=TASK_BD
spring.datasource.password=Rmi11dp009.
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
# =============================================================
# HIKARI — Pool de conexiones
# =============================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL
# =============================================================
# Spring Boot Actuator
# TODO: En producción restringir endpoints expuestos (no usar *).
# =============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=wsr_task
info.app.version=0.0.1
info.app.description=API REST Task
# =============================================================
# Swagger / OpenAPI
# =============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.packages-to-scan=com.jhontruse.wsr_task.controller
springdoc.paths-to-match=/**
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
# =============================================================
# CORS
# =============================================================
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
# =============================================================
# Logging
# =============================================================
logging.level.root=INFO
logging.level.com.jhontruse.wsrfastfood=DEBUG
logging.level.org.springframework.jdbc.core=INFO
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [TRACE=%X{traceId}] [IP=%X{ip}] [%X{method}] [%X{endpoint}] [STATUS=%X{status}] %-5level [%thread] %logger{36} - %msg%n
# =============================================================
# JPA / HIBERNATE
# =============================================================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false